<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VocabuLearn Russian — Theo chủ đề</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap');

  :root {
    --bg: #0e0e0f;
    --surface: #18181b;
    --border: #2a2a2e;
    --accent: #e8c547;
    --accent2: #5b8cf7;
    --accent3: #f77b5b;
    --text: #e8e8e8;
    --muted: #6b6b75;
    --rus: #c8a8f0;
    --eng: #a8d8c8;
    --tag: #2a2a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
    min-height: 100vh;
  }

  header {
    padding: 2.5rem 2rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .title-row {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
  }

  h1 {
    font-family: 'Unbounded', sans-serif;
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: -0.02em;
  }

  .subtitle {
    font-size: 0.85rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .stats {
    display: flex;
    gap: 1.5rem;
    margin-top: 0.5rem;
    flex-wrap: wrap;
  }

  .stat {
    font-size: 0.78rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
  }

  .stat span {
    color: var(--accent);
    font-weight: 500;
  }

  /* Filter bar */
  .filter-bar {
    padding: 1rem 2rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-label {
    font-size: 0.72rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    margin-right: 0.25rem;
  }

  .filter-btn {
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    font-size: 0.72rem;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--accent); }
  .filter-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 500; }

  /* Search */
  .search-wrap {
    margin-left: auto;
    position: relative;
  }

  .search-wrap input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 0.3rem 0.75rem 0.3rem 1.75rem;
    border-radius: 2px;
    font-size: 0.78rem;
    font-family: 'IBM Plex Mono', monospace;
    width: 200px;
    outline: none;
  }

  .search-wrap input:focus { border-color: var(--accent2); }
  .search-wrap::before {
    content: '⌕';
    position: absolute;
    left: 0.5rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.9rem;
    pointer-events: none;
  }

  /* Main layout */
  .main {
    padding: 1.5rem 2rem;
    display: flex;
    flex-direction: column;
    gap: 1.25rem;
  }

  /* Category card */
  .cat-card {
    border: 1px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .cat-card:hover { border-color: #3a3a42; }

  .cat-header {
    padding: 0.9rem 1.25rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: background 0.15s;
  }

  .cat-header:hover { background: #1e1e22; }

  .cat-icon { font-size: 1.1rem; }

  .cat-name {
    font-family: 'Unbounded', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text);
    flex: 1;
  }

  .cat-meta {
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .cat-count {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    background: var(--tag);
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
  }

  .cat-type-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    padding: 0.15rem 0.4rem;
    border-radius: 2px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  .badge-noun { background: rgba(91,140,247,0.15); color: var(--accent2); }
  .badge-verb { background: rgba(247,123,91,0.15); color: var(--accent3); }
  .badge-adj  { background: rgba(200,168,240,0.15); color: var(--rus); }
  .badge-mixed { background: rgba(232,197,71,0.15); color: var(--accent); }

  .toggle-arrow {
    color: var(--muted);
    font-size: 0.7rem;
    transition: transform 0.2s;
  }

  .cat-card.open .toggle-arrow { transform: rotate(90deg); }

  /* Vocab grid */
  .vocab-body {
    display: none;
    padding: 1rem 1.25rem 1.25rem;
    border-top: 1px solid var(--border);
    background: #111114;
  }

  .cat-card.open .vocab-body { display: block; }

  .vocab-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 0.35rem;
  }

  .vocab-item {
    display: flex;
    align-items: baseline;
    gap: 0.6rem;
    padding: 0.4rem 0.6rem;
    border-radius: 2px;
    transition: background 0.1s;
  }

  .vocab-item:hover { background: var(--surface); }

  .vocab-item.hidden { display: none; }

  .rus-word {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.82rem;
    color: var(--rus);
    font-weight: 500;
    min-width: 130px;
    flex-shrink: 0;
  }

  .sep {
    color: var(--muted);
    font-size: 0.7rem;
    flex-shrink: 0;
  }

  .eng-word {
    font-size: 0.78rem;
    color: var(--eng);
    font-family: 'IBM Plex Mono', monospace;
  }

  /* No results */
  .no-results {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.8rem;
    display: none;
  }

  /* Cat hidden when search yields nothing */
  .cat-card.search-hidden { display: none; }

  /* Accent color per category via data attr */
  .cat-card[data-color="yellow"] .cat-header { border-left: 3px solid var(--accent); }
  .cat-card[data-color="blue"]   .cat-header { border-left: 3px solid var(--accent2); }
  .cat-card[data-color="orange"] .cat-header { border-left: 3px solid var(--accent3); }
  .cat-card[data-color="purple"] .cat-header { border-left: 3px solid var(--rus); }
  .cat-card[data-color="green"]  .cat-header { border-left: 3px solid var(--eng); }

  .expand-all-btn {
    padding: 0.3rem 0.75rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    border-radius: 2px;
    font-size: 0.72rem;
    font-family: 'IBM Plex Mono', monospace;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: auto;
  }
  .expand-all-btn:hover { border-color: var(--accent); color: var(--accent); }
</style>
</head>

<header>

</div>

<div class="main" id="main-container">

// Render
const container = document.getElementById('main-container');
const noResults = document.getElementById('no-results');
let currentFilter = 'all';

function renderCategories(cats) {
  // Remove existing cards
  document.querySelectorAll('.cat-card').forEach(el => el.remove());
  
  cats.forEach(cat => {
    const card = document.createElement('div');
    card.className = 'cat-card';
    card.dataset.type = cat.type;
    card.dataset.color = cat.color;
    card.dataset.id = cat.id;

    const badgeClass = {noun:'badge-noun',verb:'badge-verb',adj:'badge-adj',mixed:'badge-mixed'}[cat.type];
    const badgeLabel = {noun:'Danh từ',verb:'Động từ',adj:'Tính/Phó từ',mixed:'Hỗn hợp'}[cat.type];

    card.innerHTML = `
      <div class="cat-header" onclick="toggleCard(this)">
        <span class="cat-icon">${cat.icon}</span>
        <span class="cat-name">${cat.name}</span>
        <div class="cat-meta">
          <span class="cat-count">${cat.words.length} từ</span>
          <span class="cat-type-badge ${badgeClass}">${badgeLabel}</span>
        </div>
        <span class="toggle-arrow">▶</span>
      </div>
      <div class="vocab-body">
        <div class="vocab-grid">
          ${cat.words.map(([rus, eng]) => `
            <div class="vocab-item" data-rus="${rus.toLowerCase()}" data-eng="${eng.toLowerCase()}">
              <span class="rus-word">${rus}</span>
              <span class="sep">—</span>
              <span class="eng-word">${eng}</span>
            </div>
          `).join('')}
        </div>
      </div>
    `;
    container.insertBefore(card, noResults);
  });

  updateCounts();
}

function toggleCard(header) {
  const card = header.closest('.cat-card');
  card.classList.toggle('open');
}

function updateCounts() {
  const allCards = document.querySelectorAll('.cat-card:not(.search-hidden)');
  let visibleWords = 0;
  allCards.forEach(card => {
    visibleWords += card.querySelectorAll('.vocab-item:not(.hidden)').length;
  });
  document.getElementById('total-count').textContent =
    CATEGORIES.reduce((s,c)=>s+c.words.length,0);
  document.getElementById('cat-count').textContent = allCards.length;
  document.getElementById('visible-count').textContent = visibleWords;
}

// Filter by type
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    applyFilters();
  });
});

function applyFilters() {
  const searchVal = document.getElementById('search-input').value.toLowerCase().trim();
  let anyVisible = false;

  document.querySelectorAll('.cat-card').forEach(card => {
    const typeMatch = currentFilter === 'all' || card.dataset.type === currentFilter;
    if (!typeMatch) {
      card.classList.add('search-hidden');
      return;
    }

    if (searchVal) {
      let cardHasMatch = false;
      card.querySelectorAll('.vocab-item').forEach(item => {
        const match = item.dataset.rus.includes(searchVal) || item.dataset.eng.includes(searchVal);
        item.classList.toggle('hidden', !match);
        if (match) cardHasMatch = true;
      });
      card.classList.toggle('search-hidden', !cardHasMatch);
      if (cardHasMatch) { card.classList.add('open'); anyVisible = true; }
    } else {
      card.classList.remove('search-hidden');
      card.querySelectorAll('.vocab-item').forEach(item => item.classList.remove('hidden'));
      anyVisible = true;
    }
  });

  noResults.style.display = anyVisible ? 'none' : 'block';
  updateCounts();
}

document.getElementById('search-input').addEventListener('input', applyFilters);

// Expand all
let allExpanded = false;
document.getElementById('expand-all-btn').addEventListener('click', function() {
  allExpanded = !allExpanded;
  document.querySelectorAll('.cat-card:not(.search-hidden)').forEach(card => {
    card.classList.toggle('open', allExpanded);
  });
  this.textContent = allExpanded ? '▼ Thu tất cả' : '▶ Mở tất cả';
});

// Init
renderCategories(CATEGORIES);
</script>
